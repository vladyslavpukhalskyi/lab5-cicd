# Опис сервісів (контейнерів), які складають нашу систему
services:
  # Сервіс бекенд-застосунку
  app:
    # Вказує Docker побудувати образ на основі Dockerfile у поточній директорії
    build: .
    # Прокидання порту: звернення до localhost:3000 на хості перенаправляється на порт 3000 контейнера
    ports:
      - 127.0.0.1:3000:3000
    # Змінні оточення для підключення до БД (параметри передаються в код застосунку)
    environment:
      MYSQL_HOST: mysql      # Ім'я сервісу БД (Docker автоматично вирішить його в IP)
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DB: todos
    # Керування черговістю запуску: застосунок чекає на готовність бази даних
    depends_on:
      mysql:
        condition: service_healthy # Запуск почнеться лише після успішного healthcheck-у бази

  # Сервіс бази даних MySQL
  mysql:
    # Використання офіційного готового образу MySQL версії 8.0
    image: mysql:8.0
    # Монтування іменованого тому для збереження даних (persistence)
    volumes:
      - todo-mysql-data:/var/lib/mysql # Дані бази зберігаються поза контейнером
    # Конфігурація самої бази даних через змінні оточення
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: todos
    # Перевірка працездатності контейнера
    healthcheck:
      # Команда, що перевіряє, чи відповідає сервер MySQL на запити
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s   # Проміжок між перевірками
      timeout: 5s    # Час очікування відповіді
      retries: 5     # Кількість спроб до визнання контейнера "нездоровим"

# Оголошення іменованих томів, що керуються Docker
volumes:
  todo-mysql-data: # Цей том забезпечує збереження даних навіть після видалення контейнерів